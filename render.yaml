services:
  - type: web
    name: semantic-cv-api
    env: docker
    rootDir: cv_api
    dockerfilePath: Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION
        value: candidates
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CORS_ORIGINS
        sync: false
